name: Bot Runner
on:
  workflow_dispatch: # Кнопка ручного запуска
  schedule:
    - cron: '0 */6 * * *' # Перезапуск каждые 6 часов (автоматически)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install aiogram
      - name: Run bot
        run: python bot.py
