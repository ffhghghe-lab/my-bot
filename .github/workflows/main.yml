name: Bot Runner
on:
  workflow_dispatch: # Чтобы запускать кнопкой
  schedule:
    - cron: '0 */6 * * *' # Будет сам перезапускаться каждые 6 часов

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install aiogram
      - name: Run bot
        run: python "мой бот.py"
